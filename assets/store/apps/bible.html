<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KJV Bible</title>
    <meta name="capabilities" content="content_readonly">
    <meta name="nova-include" content="nova.css material-symbols-rounded">
    <meta name="permissions" content="fetch">
    <meta name="nova-icon" content="<svg xmlns='http://www.w3.org/2000/svg' height='24px' viewBox='0 -960 960 960' width='24px' fill='currentColor'><path d='M560-564v-68q33-14 67.5-21t72.5-7q26 0 51 4t49 10v64q-24-9-48.5-13.5T700-600q-38 0-73 9.5T560-564Zm0 220v-68q33-14 67.5-21t72.5-7q26 0 51 4t49 10v64q-24-9-48.5-13.5T700-380q-38 0-73 9t-67 27Zm0-110v-68q33-14 67.5-21t72.5-7q26 0 51 4t49 10v64q-24-9-48.5-13.5T700-490q-38 0-73 9.5T560-454ZM260-320q47 0 91.5 10.5T440-278v-394q-41-24-87-36t-93-12q-36 0-71.5 7T120-692v396q35-12 69.5-18t70.5-6Zm260 42q44-21 88.5-31.5T700-320q36 0 70.5 6t69.5 18v-396q-33-14-68.5-21t-71.5-7q-48 0-93 12t-87 36v394Zm-40 118q-48-38-104-59t-116-21q-42 0-82.5 11T100-198q-21 11-34.5 32T52-120v-560q0-44 35.5-75.5T182-776q54 0 104 17.5t94 51.5q44-34 94-51.5t104-17.5q46 0 81.5 31.5T596-680v560q0-28-13.5-49.5T548-198q-37-20-77.5-31T388-240q-60 0-116 21t-104 59ZM280-494Z'/></svg>">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-family, system-ui, -apple-system, sans-serif);
            background: var(--col-bg1, #1a1a1a);
            color: var(--col-txt1, #ffffff);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 16px;
            background: var(--col-bg2, #252525);
            border-bottom: 1px solid var(--col-bg3, #333333);
        }

        .header h1 {
            font-size: 18px;
            font-weight: 600;
            flex: 1;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .toolbar {
            display: flex;
            gap: 6px;
            padding: 8px 12px;
            background: var(--col-bg2, #252525);
            border-bottom: 1px solid var(--col-bg3, #333333);
            align-items: center;
        }

        .toolbar select {
            background: var(--col-bg3, #333333);
            color: var(--col-txt1, #ffffff);
            border: 1px solid var(--col-bg3, #333333);
            padding: 6px 8px;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            min-width: 80px;
            flex-shrink: 0;
        }

        .toolbar select:focus {
            outline: 2px solid var(--accent-color, #6179FF);
        }

        .toolbar input {
            flex: 1;
            background: var(--col-bg3, #333333);
            color: var(--col-txt1, #ffffff);
            border: 1px solid var(--col-bg3, #333333);
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 13px;
            min-width: 60px;
        }

        .toolbar input:focus {
            outline: 2px solid var(--accent-color, #6179FF);
        }

        .toolbar button {
            background: var(--accent-color, #6179FF);
            color: white;
            border: none;
            padding: 6px 10px;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .toolbar button:hover {
            opacity: 0.9;
        }

        .content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            line-height: 1.8;
        }

        .verse {
            margin-bottom: 12px;
            display: flex;
            gap: 12px;
        }

        .verse-number {
            color: var(--accent-color, #6179FF);
            font-weight: 600;
            min-width: 28px;
            user-select: none;
        }

        .verse-text {
            flex: 1;
        }

        .loading, .error {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            gap: 16px;
            text-align: center;
            padding: 20px;
        }

        .loader {
            width: 40px;
            height: 40px;
            border: 3px solid var(--col-bg3, #333333);
            border-top-color: var(--accent-color, #6179FF);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-icon {
            font-size: 48px;
            color: #ff6b6b;
        }


        .search-results {
            padding: 16px;
        }

        .search-result {
            padding: 12px;
            margin-bottom: 8px;
            background: var(--col-bg2, #252525);
            border-radius: 8px;
            cursor: pointer;
            border-left: 3px solid var(--accent-color, #6179FF);
        }

        .search-result:hover {
            background: var(--col-bg3, #333333);
        }

        .search-result-ref {
            font-weight: 600;
            color: var(--accent-color, #6179FF);
            margin-bottom: 4px;
        }

        .search-result-text {
            font-size: 14px;
            opacity: 0.9;
        }

        .highlight {
            background: rgba(97, 121, 255, 0.3);
            padding: 2px 4px;
            border-radius: 4px;
        }

        .nav-buttons {
            display: flex;
            justify-content: space-between;
            padding: 12px 16px;
            background: var(--col-bg2, #252525);
            border-top: 1px solid var(--col-bg3, #333333);
        }

        .nav-buttons button {
            background: var(--col-bg3, #333333);
            color: var(--col-txt1, #ffffff);
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .nav-buttons button:hover {
            background: var(--accent-color, #6179FF);
        }

        .nav-buttons button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <div class="toolbar" id="toolbar">
        <select id="bookSelect" onchange="loadChapters()">
            <option value="">Book</option>
        </select>
        <select id="chapterSelect" onchange="loadChapter()">
            <option value="">Chapter</option>
        </select>
        <input type="text" id="searchInput" placeholder="Search...">
        <button onclick="searchBible()"><span class="material-symbols-rounded">search</span></button>
        <button onclick="showReader()"><span class="material-symbols-rounded">book</span></button>
    </div>

    <div class="content" id="content">
        <div class="loading">
            <div class="loader"></div>
            <p>Loading Bible...</p>
        </div>
    </div>

    <div class="nav-buttons" id="navButtons">
        <button onclick="previousChapter()" id="prevBtn"><span class="material-symbols-rounded">arrow_back</span> Previous</button>
        <button onclick="nextChapter()" id="nextBtn">Next <span class="material-symbols-rounded">arrow_forward</span></button>
    </div>

    <script>
        let bibleData = null;
        let books = [];
        let currentBook = 'Genesis';
        let currentChapter = 1;

        async function loadBible() {
            try {
                const response = await fetch(new URL('assets/json/kjv.json', window.parent.location.href).href);
                if (!response.ok) throw new Error('Failed to load Bible data');
                const rawData = await response.json();
                
                // Convert array format to object format for easier access
                bibleData = {};
                rawData.forEach(book => {
                    bibleData[book.book] = {};
                    book.chapters.forEach(chapter => {
                        bibleData[book.book][chapter.chapter] = chapter.verses;
                    });
                });
                
                books = Object.keys(bibleData);
                populateBooks();
                loadChapter();
            } catch (error) {
                showError('Failed to load Bible data. Please try again.');
                console.error('Error loading Bible:', error);
            }
        }

        function showError(message) {
            document.getElementById('content').innerHTML = `
                <div class="error">
                    <span class="material-symbols-rounded error-icon">error</span>
                    <p>${message}</p>
                </div>
            `;
        }

        function populateBooks() {
            const select = document.getElementById('bookSelect');
            select.innerHTML = '<option value="">Select Book</option>';
            books.forEach(book => {
                const option = document.createElement('option');
                option.value = book;
                option.textContent = book;
                select.appendChild(option);
            });
        }

        function loadChapters() {
            const book = document.getElementById('bookSelect').value;
            if (!book) return;

            const chapters = Object.keys(bibleData[book]);
            const select = document.getElementById('chapterSelect');
            select.innerHTML = '<option value="">Select Chapter</option>';
            chapters.forEach(chapter => {
                const option = document.createElement('option');
                option.value = chapter;
                option.textContent = `Chapter ${chapter}`;
                select.appendChild(option);
            });

            currentBook = book;
            currentChapter = 1;
            select.value = '1';
            loadChapter();
        }

        function loadChapter() {
            const bookSelect = document.getElementById('bookSelect');
            const chapterSelect = document.getElementById('chapterSelect');
            
            if (bookSelect.value) currentBook = bookSelect.value;
            if (chapterSelect.value) currentChapter = parseInt(chapterSelect.value);

            if (!bibleData[currentBook]) return;

            const chapterData = bibleData[currentBook][currentChapter];
            if (!chapterData) return;

            bookSelect.value = currentBook;
            if (chapterSelect.value !== String(currentChapter)) {
                chapterSelect.value = currentChapter;
            }

            let html = '';
            
            chapterData.forEach(verse => {
                html += `
                    <div class="verse">
                        <span class="verse-number">${verse.verse}</span>
                        <span class="verse-text">${verse.text}</span>
                    </div>
                `;
            });

            document.getElementById('content').innerHTML = html;
            document.getElementById('content').scrollTop = 0;
            
            updateNavButtons();
        }

        function updateNavButtons() {
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');

            prevBtn.disabled = currentBook === books[0] && currentChapter === 1;
            
            const lastBook = books[books.length - 1];
            const lastChapter = Object.keys(bibleData[lastBook]).length;
            nextBtn.disabled = currentBook === lastBook && currentChapter === lastChapter;
        }

        function previousChapter() {
            if (currentChapter > 1) {
                currentChapter--;
            } else {
                const bookIndex = books.indexOf(currentBook);
                if (bookIndex > 0) {
                    currentBook = books[bookIndex - 1];
                    currentChapter = Object.keys(bibleData[currentBook]).length;
                }
            }
            document.getElementById('chapterSelect').value = currentChapter;
            populateChapters();
            loadChapter();
        }

        function nextChapter() {
            const maxChapter = Object.keys(bibleData[currentBook]).length;
            if (currentChapter < maxChapter) {
                currentChapter++;
            } else {
                const bookIndex = books.indexOf(currentBook);
                if (bookIndex < books.length - 1) {
                    currentBook = books[bookIndex + 1];
                    currentChapter = 1;
                }
            }
            document.getElementById('chapterSelect').value = currentChapter;
            populateChapters();
            loadChapter();
        }

        function populateChapters() {
            const book = currentBook;
            const chapters = Object.keys(bibleData[book]);
            const select = document.getElementById('chapterSelect');
            select.innerHTML = '<option value="">Select Chapter</option>';
            chapters.forEach(chapter => {
                const option = document.createElement('option');
                option.value = chapter;
                option.textContent = `Chapter ${chapter}`;
                select.appendChild(option);
            });
        }

        function searchBible() {
            const query = document.getElementById('searchInput').value.trim().toLowerCase();
            if (!query) return;

            const results = [];
            books.forEach(book => {
                Object.keys(bibleData[book]).forEach(chapter => {
                    bibleData[book][chapter].forEach(verse => {
                        if (verse.text.toLowerCase().includes(query)) {
                            results.push({
                                book: book,
                                chapter: chapter,
                                verse: verse.verse,
                                text: verse.text
                            });
                        }
                    });
                });
            });

            displaySearchResults(results, query);
        }

        function displaySearchResults(results, query) {
            document.getElementById('toolbar').style.display = 'none';
            document.getElementById('navButtons').style.display = 'none';

            if (results.length === 0) {
                document.getElementById('content').innerHTML = `
                    <div class="error">
                        <span class="material-symbols-rounded error-icon">search_off</span>
                        <p>No results found for "${query}"</p>
                    </div>
                `;
                return;
            }

            let html = `<div class="chapter-title">Search Results (${results.length})</div><div class="search-results">`;
            
            results.forEach(result => {
                const highlightedText = result.text.replace(
                    new RegExp(query, 'gi'),
                    match => `<span class="highlight">${match}</span>`
                );
                html += `
                    <div class="search-result" onclick="goToVerse('${result.book}', ${result.chapter})">
                        <div class="search-result-ref">${result.book} ${result.chapter}:${result.verse}</div>
                        <div class="search-result-text">${highlightedText}</div>
                    </div>
                `;
            });
            
            html += '</div>';
            document.getElementById('content').innerHTML = html;
            document.getElementById('content').scrollTop = 0;
        }

        function goToVerse(book, chapter) {
            currentBook = book;
            currentChapter = chapter;
            showReader();
            populateChapters();
            loadChapter();
        }

        function showReader() {
            document.getElementById('toolbar').style.display = 'flex';
            document.getElementById('navButtons').style.display = 'flex';
            populateBooks();
            populateChapters();
            loadChapter();
        }

        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') searchBible();
        });

        // NovaOS greenflag entry point
        function greenflag() {
            loadBible();
        }

        // Fallback for non-NovaOS contexts
        if (typeof greenflag !== 'undefined' && !window.parent.location.href.includes('novaos')) {
            greenflag();
        }
    </script>
</body>
</html>
